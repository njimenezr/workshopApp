<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genie Code Workshop — Grupo Lafise</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --lafise-primary: #00583C;
      --lafise-accent: #018765;
      --lafise-dark: #002519;
      --lafise-green: #00583C;
      --bg: #FFFFFF;
      --bg-light: #F6F6F6;
      --bg-card: #F6F6F6;
      --bg-card-h: #EFEFEF;
      --text: #002519;
      --text2: #6F6F6F;
      --text3: #999999;
      --ok: #00583C;
      --border: #E8E8E8;
      --border2: #D4D4D4;
      --radius: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
    ::selection { background:var(--lafise-primary); color:#FFF; }

    /* ===== HEADER ===== */
    .topbar {
      background:#FFF; border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:200;
    }
    .topbar-inner {
      max-width:1280px; margin:0 auto; padding:12px 32px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .topbar-left { display:flex; align-items:center; gap:16px; }
    .topbar-logo {
      font-size:36px; font-weight:700; color:var(--lafise-primary);
      line-height:1; cursor:pointer; letter-spacing:-2px;
      font-family:'DM Sans',sans-serif;
    }
    .topbar-logo svg { height:40px; width:auto; }
    .topbar-nav { display:flex; gap:28px; margin-left:24px; }
    .topbar-nav a {
      font-size:14px; font-weight:500; color:var(--text); text-decoration:none;
      padding:4px 0; border-bottom:2px solid transparent; transition:all .2s;
    }
    .topbar-nav a:hover { color:var(--lafise-accent); }
    .topbar-nav a.active { border-bottom-color:var(--lafise-primary); font-weight:700; }
    .btn-enter {
      background:transparent; border:2px solid var(--lafise-dark);
      color:var(--lafise-dark); padding:10px 28px; border-radius:24px;
      font-family:inherit; font-size:14px; font-weight:700;
      cursor:pointer; transition:all .2s;
    }
    .btn-enter:hover { background:var(--lafise-dark); color:#FFF; }

    /* ===== CATEGORY STRIP ===== */
    .cat-strip {
      background:#FFF; border-bottom:1px solid var(--border);
      overflow-x:auto; -webkit-overflow-scrolling:touch;
    }
    .cat-strip-inner {
      max-width:1280px; margin:0 auto; padding:16px 32px 0;
      display:flex; justify-content:center; gap:40px;
    }
    .cat-item {
      display:flex; flex-direction:column; align-items:center; gap:6px;
      padding-bottom:12px; border-bottom:3px solid transparent;
      cursor:default; min-width:80px; transition:border-color .2s;
    }
    .cat-item.active { border-bottom-color:var(--lafise-primary); }
    .cat-item.disabled { opacity:.4; cursor:not-allowed; }
    .cat-item.disabled .cat-label { color:var(--text3); }
    .cat-icon { line-height:1; }
    .cat-icon img { height:36px; width:auto; }
    .cat-item.disabled .cat-icon img { filter:grayscale(1); }
    .cat-label { font-size:13px; font-weight:600; color:var(--text); text-align:center; white-space:nowrap; }
    .cat-badge { font-size:9px; font-weight:700; color:#FFF; background:var(--text3); border-radius:8px; padding:2px 7px; margin-top:-2px; letter-spacing:.03em; }

    /* ===== LANDING ===== */
    .container { max-width:1280px; margin:0 auto; padding:32px 32px 64px; }
    .section-title {
      font-size:28px; font-weight:700; color:var(--text);
      margin-bottom:24px; letter-spacing:-0.02em;
    }
    .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }
    @media (max-width:900px) { .grid { grid-template-columns:repeat(2,1fr); } }
    @media (max-width:520px) { .grid { grid-template-columns:1fr; } }

    .card {
      background:var(--bg-card); border-radius:var(--radius);
      cursor:pointer; overflow:hidden; transition:all .25s;
      display:flex; flex-direction:column; border:1px solid transparent;
    }
    .card:hover { box-shadow:0 4px 20px rgba(0,0,0,.08); border-color:var(--border); transform:translateY(-2px); }
    .card-img {
      height:210px; display:flex; align-items:center; justify-content:center;
      padding:16px 24px; position:relative;
    }
    .card-img img { height:100%; width:100%; object-fit:contain; }
    .card-badge {
      position:absolute; top:12px; right:12px;
      background:#FFF; border-radius:20px; padding:4px 10px;
      font-size:11px; font-weight:600; color:var(--text2);
      box-shadow:0 1px 4px rgba(0,0,0,.08);
    }
    .card-info { padding:16px 20px 20px; }
    .card-name { font-size:16px; font-weight:700; color:var(--text); margin-bottom:4px; }
    .card-sub { font-size:13px; color:var(--text2); line-height:1.4; }
    .card-meta-row {
      display:flex; align-items:center; gap:12px; margin-top:10px;
      font-size:12px; color:var(--text3);
    }
    .card-meta-row span { display:flex; align-items:center; gap:4px; }

    /* ===== TRACK VIEW ===== */
    .track-header-bar {
      background:#FFF; border-bottom:1px solid var(--border);
      padding:16px 0;
    }
    .track-header-inner {
      max-width:1280px; margin:0 auto; padding:0 32px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .track-title-group { display:flex; align-items:center; gap:14px; }
    .track-title-group .icon { font-size:32px; }
    .track-title-group h2 { font-size:22px; font-weight:700; letter-spacing:-0.02em; }
    .track-title-group .sub { font-size:14px; color:var(--text2); font-weight:500; }
    .btn-back {
      background:transparent; border:2px solid var(--border2);
      color:var(--text2); padding:8px 18px; border-radius:24px;
      cursor:pointer; font-family:inherit; font-size:13px; font-weight:600; transition:all .2s;
    }
    .btn-back:hover { border-color:var(--lafise-dark); color:var(--lafise-dark); }

    /* Progress */
    .progress { margin-bottom:20px; }
    .progress-top { display:flex; justify-content:space-between; font-size:13px; color:var(--text2); margin-bottom:8px; }
    .progress-bar { width:100%; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:2px; transition:width .4s; }

    /* Pills */
    .pills { display:flex; gap:6px; margin-bottom:24px; overflow-x:auto; padding-bottom:4px; }
    .pill {
      min-width:38px; height:38px; border-radius:10px;
      border:2px solid var(--border); background:#FFF;
      color:var(--text3); font-family:inherit; font-size:13px; font-weight:600;
      cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s;
    }
    .pill.active { border-width:2px; }
    .pill.done { background:#E8F5E9; color:var(--ok); border-color:#C8E6C9; }

    /* Step */
    .step {
      background:#FFF; border:1px solid var(--border); border-radius:var(--radius);
      padding:28px; margin-bottom:16px; transition:border-color .3s;
    }
    .step.completed { border-color:#A5D6A7; background:#FAFFF9; }
    .step-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
    .step-num {
      width:34px; height:34px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-weight:700; font-size:14px; flex-shrink:0;
    }
    .step-title { font-size:17px; font-weight:700; }
    .step-check {
      display:flex; align-items:center; gap:6px;
      font-size:13px; color:var(--text2); cursor:pointer; white-space:nowrap;
    }
    .step-check input { accent-color:var(--ok); width:17px; height:17px; }
    .step-desc { font-size:14px; color:var(--text2); line-height:1.7; margin-bottom:16px; }

    /* Prompt */
    .prompt-label {
      display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;
    }
    .prompt-label span {
      font-size:11px; color:var(--text3); font-weight:700;
      text-transform:uppercase; letter-spacing:.06em;
    }
    .btn-copy {
      background:var(--lafise-accent); color:#FFF; border:none;
      padding:6px 14px; border-radius:20px; cursor:pointer;
      font-family:inherit; font-size:12px; font-weight:600; transition:all .2s;
    }
    .btn-copy:hover { background:#016B53; }
    .btn-copy.copied { background:var(--ok); }
    .prompt-box {
      background:var(--bg-light); border:1px solid var(--border);
      border-radius:8px; padding:16px 18px;
      font-family:'DM Mono',monospace; font-size:13px; line-height:1.7;
      white-space:pre-wrap; word-break:break-word;
      max-height:280px; overflow-y:auto; color:var(--text);
    }

    /* Expected output */
    .expected {
      background:#F1F8E9; border:1px solid #DCEDC8;
      border-radius:8px; padding:12px 16px; margin-top:16px;
    }
    .expected-label { font-size:11px; color:var(--ok); font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
    .expected-text { font-size:13px; color:var(--text2); line-height:1.6; margin-top:4px; }

    /* Warning */
    .warning {
      background:#FFF8E1; border:1px solid #FFE082;
      border-radius:8px; padding:12px 16px; margin-bottom:16px;
      font-size:13px; color:#F57F17;
    }

    /* Tips */
    .tips { margin-top:14px; }
    .tip {
      font-size:13px; color:var(--text2); line-height:1.6;
      padding-left:14px; border-left:3px solid var(--border); margin-bottom:8px;
    }

    /* Nav buttons */
    .nav-btns { display:flex; justify-content:space-between; margin-top:20px; }
    .btn-nav {
      padding:12px 24px; border-radius:24px;
      font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; transition:all .2s;
    }
    .btn-prev {
      background:transparent; border:2px solid var(--border2); color:var(--text2);
    }
    .btn-prev:hover { border-color:var(--lafise-dark); color:var(--lafise-dark); }
    .btn-prev:disabled { color:var(--text3); border-color:var(--border); cursor:default; }
    .btn-next { border:none; color:#FFF; font-weight:700; }
    .btn-next:hover { filter:brightness(1.1); }
    .btn-next:disabled { background:var(--border)!important; color:var(--text3); cursor:default; }

    /* FAQ */
    .faq { margin-top:36px; }
    .faq h3 { font-size:18px; font-weight:700; margin-bottom:14px; }
    .faq-item {
      background:var(--bg-light); border:1px solid var(--border);
      border-radius:10px; margin-bottom:8px; overflow:hidden;
    }
    .faq-q {
      width:100%; text-align:left; padding:14px 18px;
      background:transparent; border:none; cursor:pointer;
      display:flex; justify-content:space-between; align-items:center;
      font-family:inherit; font-size:14px; font-weight:600; color:var(--text);
    }
    .faq-a {
      padding:0 18px 14px; font-size:13px; color:var(--text2);
      line-height:1.7; display:none;
    }
    .faq-item.open .faq-a { display:block; }
    .faq-item.open .faq-toggle { transform:rotate(45deg); }
    .faq-toggle { color:var(--text3); font-size:20px; transition:transform .2s; }

    /* Footer */
    .lafise-footer {
      background:var(--lafise-dark); color:#FFF; padding:32px;
      text-align:center; font-size:13px; margin-top:48px;
    }
    .lafise-footer a { color:#A3D9C2; text-decoration:none; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-left">
        <div class="topbar-logo" onclick="goBack()">
          <img src="img/grupo-lafise-logo.svg" alt="Grupo Lafise" height="44">
        </div>
        <nav class="topbar-nav" id="topnav">
          <a href="#" class="active">Workshop</a>
          <a href="#" onclick="return false">Recursos</a>
          <a href="#" onclick="return false">Soporte</a>
        </nav>
      </div>
      <button class="btn-enter" id="btn-enter">Entrar</button>
    </div>
  </div>

  <div id="app"></div>

  <!-- FOOTER -->
  <div class="mc-footer">
    Genie Code Workshop — Grupo Lafise &amp; <a href="#">Databricks</a> — 2026
  </div>

  <script>
const $ = s => document.querySelector(s);
const COLORS = {
  'data-engineering':'#FF6D00',
  'bi-analytics':'#DA291C',
  'data-science':'#7C3AED',
  'data-governance':'#0891B2'
};
const TRACK_IMAGES = {
  'data-engineering':'img/track-engineering.svg',
  'bi-analytics':'img/track-bi.svg',
  'data-science':'img/track-datascience.svg',
  'data-governance':'img/track-governance.svg'
};

let state = { view:'landing', tracks:[], trackData:null, step:0, done:{} };

function loadProgress(id) {
  try { return new Set(JSON.parse(localStorage.getItem('ws-'+id)||'[]')); } catch(e) { return new Set(); }
}
function saveProgress(id, set) {
  try { localStorage.setItem('ws-'+id, JSON.stringify([...set])); } catch(e) {}
}

async function init() {
  const res = await fetch('/api/tracks');
  state.tracks = await res.json();
  render();
}

async function selectTrack(id) {
  const res = await fetch('/api/tracks/'+id);
  state.trackData = await res.json();
  state.step = 0;
  state.done = loadProgress(id);
  state.view = 'track';
  render();
  window.scrollTo(0,0);
}

function goBack() {
  state.view = 'landing';
  state.trackData = null;
  render();
  window.scrollTo(0,0);
}

function setStep(i) {
  state.step = i;
  render();
  document.querySelector('#app .step')?.scrollIntoView({behavior:'smooth',block:'start'});
}

function toggleDone(stepId) {
  if (state.done.has(stepId)) state.done.delete(stepId); else state.done.add(stepId);
  saveProgress(state.trackData.id, state.done);
  render();
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
  });
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function renderLanding() {
  const cards = state.tracks.map(t => {
    const c = COLORS[t.id]||'#DA291C';
    const progress = loadProgress(t.id);
    const pct = t.stepCount > 0 ? Math.round((progress.size / t.stepCount)*100) : 0;
    const imgSrc = TRACK_IMAGES[t.id] || '';
    return `
    <div class="card" onclick="selectTrack('${t.id}')">
      <div class="card-img" style="background:linear-gradient(145deg, ${c}05, ${c}0A)">
        ${pct > 0 ? `<div class="card-badge">${pct}%</div>` : ''}
        <img src="${imgSrc}" alt="${esc(t.title)}">
      </div>
      <div class="card-info">
        <div class="card-name">${esc(t.title)}</div>
        <div class="card-sub">${esc(t.subtitle)}</div>
        <div class="card-meta-row">
          <span>⏱ ${t.estimatedMinutes} min</span>
          <span>📋 ${t.stepCount} pasos</span>
          <span>👥 ${t.participantCount}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="cat-strip">
      <div class="cat-strip-inner">
        <div class="cat-item active">
          <div class="cat-icon"><img src="img/genie-lockup.svg" alt="Databricks Genie"></div>
          <div class="cat-label">Genie Code<br>Workshop</div>
        </div>
        <div class="cat-item disabled">
          <div class="cat-icon"><img src="img/databricks-symbol.svg" alt="AI/BI"></div>
          <div class="cat-label">AI/BI<br>Workshop</div>
          <div class="cat-badge">PRONTO</div>
        </div>
        <div class="cat-item disabled">
          <div class="cat-icon"><img src="img/databricks-symbol.svg" alt="Spark"></div>
          <div class="cat-label">Spark Declarative<br>Pipelines</div>
          <div class="cat-badge">PRONTO</div>
        </div>
      </div>
    </div>
    <div class="container">
      <h1 class="section-title">Elige tu track</h1>
      <div class="grid">${cards}</div>
    </div>`;
}

function renderTrack() {
  const t = state.trackData;
  const c = COLORS[t.id]||'#DA291C';
  const s = t.steps[state.step];
  const isDone = state.done.has(s.id);
  const pct = t.steps.length > 0 ? Math.round((state.done.size / t.steps.length)*100) : 0;

  const pills = t.steps.map((st,i) => {
    const d = state.done.has(st.id);
    const act = i === state.step;
    let cls = 'pill';
    let sty = '';
    if (d) cls += ' done';
    if (act) { cls += ' active'; sty = `border-color:${c};${d?'':`background:${c}10;color:${c}`}`; }
    return `<button class="${cls}" style="${sty}" onclick="setStep(${i})">${d?'✓':st.stepNumber}</button>`;
  }).join('');

  let promptHtml = '';
  if (s.prompt) {
    const escaped = s.prompt.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
    promptHtml = `
      <div class="prompt-label">
        <span>Prompt para Genie Code</span>
        <button class="btn-copy" onclick="copyText(\`${escaped}\`, this)">Copiar</button>
      </div>
      <div class="prompt-box">${esc(s.prompt)}</div>`;
  }

  let expectedHtml = '';
  if (s.expectedOutput) {
    expectedHtml = `
      <div class="expected">
        <div class="expected-label">Resultado esperado</div>
        <div class="expected-text">${esc(s.expectedOutput)}</div>
      </div>`;
  }

  let warningHtml = '';
  if (s.warningNote) {
    warningHtml = `<div class="warning">⚠️ ${esc(s.warningNote)}</div>`;
  }

  let tipsHtml = '';
  if (s.tips && s.tips.length) {
    tipsHtml = `<div class="tips">${s.tips.map(tip => `<div class="tip">${esc(tip)}</div>`).join('')}</div>`;
  }

  let faqHtml = '';
  if (t.faq && t.faq.length) {
    const items = t.faq.map((f,i) => `
      <div class="faq-item" onclick="this.classList.toggle('open')">
        <button class="faq-q">${esc(f.question)}<span class="faq-toggle">+</span></button>
        <div class="faq-a">${esc(f.answer)}</div>
      </div>`).join('');
    faqHtml = `<div class="faq"><h3>Preguntas frecuentes</h3>${items}</div>`;
  }

  return `
    <div class="track-header-bar">
      <div class="track-header-inner">
        <div class="track-title-group">
          <span class="icon">${t.icon}</span>
          <div>
            <h2>${esc(t.title)}</h2>
            <div class="sub">${esc(t.subtitle)}</div>
          </div>
        </div>
        <button class="btn-back" onclick="goBack()">← Volver</button>
      </div>
    </div>
    <div class="container">
      <div class="progress">
        <div class="progress-top">
          <span>Paso ${state.step+1} de ${t.steps.length}</span>
          <span style="color:${c};font-weight:700">${pct}% completado</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${c}"></div></div>
      </div>
      <div class="pills">${pills}</div>
      <div class="step ${isDone?'completed':''}">
        <div class="step-header">
          <div style="display:flex;align-items:center;gap:14px;flex:1">
            <div class="step-num" style="background:${isDone?'#E8F5E9':c+'15'};color:${isDone?'var(--ok)':c}">${isDone?'✓':s.stepNumber}</div>
            <div class="step-title">${esc(s.title)}</div>
          </div>
          <label class="step-check">
            <input type="checkbox" ${isDone?'checked':''} onchange="toggleDone('${s.id}')"> Completado
          </label>
        </div>
        <div class="step-desc">${esc(s.description)}</div>
        ${warningHtml}
        ${promptHtml}
        ${expectedHtml}
        ${tipsHtml}
      </div>
      <div class="nav-btns">
        <button class="btn-nav btn-prev" ${state.step===0?'disabled':''} onclick="setStep(${state.step-1})">← Anterior</button>
        <button class="btn-nav btn-next" style="background:${c}" ${state.step===t.steps.length-1?'disabled':''} onclick="setStep(${state.step+1})">Siguiente →</button>
      </div>
      ${faqHtml}
    </div>`;
}

function render() {
  $('#app').innerHTML = state.view === 'landing' ? renderLanding() : renderTrack();
}

init();
  </script>
</body>
</html>
